[flake8]
statistics = true
# E501 - conflicts with black line length
# E203 - conflicts with black space before :
# E402 - allow imports anywhere in file
extend-ignore = E501, E203, E402
exclude = .git,__pycache__
# F401 - intentionally unused imports in __init__.py
# F403 - allow wildcard imports in __init__.py
per-file-ignores =__init__.py:F401,F403

[coverage:run]
; parallel = true
concurrency = thread,gevent
disable_warnings = no-data-collected
relative_files = true
source =
    app/
    lib/

omit =
    **/__init__*
    tests/*
    stubs/*

[coverage:report]
exclude_lines =
    pragma: no cover

exclude_also =
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

[coverage:html]
directory = coverage_report/coverage.html

[coverage:xml]
output = coverage_report/coverage.xml
