    "aiosmtplib (>=3.0.2,<4.0.0)",
    "alembic (>=1.16.5,<2.0.0)",
    "asgiref (>=3.6.0,<4.0.0)",
    "asyncpg (>=0.30.0,<0.31.0)",
    "bcrypt (>=4.2.1,<5.0.0)",
    "dill (>=0.3.6,<0.4.0)",
    "email-validator (>=2.0,<3.0)",
    "eth-account (>=0.13.7,<0.14.0)",
    "fastapi (>=0.116.2,<0.117.0)",
    "fastapi-mail (>=1.4.2,<2.0.0)",
    "gcloud-aio-auth (>=5.4.2,<6.0.0)",
    "gcloud-aio-storage>=9.6.0,<10.0.0",
    "google-cloud-secret-manager (>=2.24.0,<3.0.0)",
    "google-cloud-storage (>=3.3.1,<4.0.0)",
    "httpx (>=0.28.1,<0.29.0)",
    "jinja2 (>=3.1.2,<4.0.0)",
    "orjson (>=3.11.3,<4.0.0)",
    "pillow (>=11.3.0,<12.0.0)",
    # In prod: https://www.psycopg.org/psycopg3/docs/basic/install.html#local-installation
    "psycopg[binary,pool] (==3.2.4)",
    "pydantic (>=2.11.9,<3.0.0)",
    "pydantic-settings (>=2.10.1,<3.0.0)",
    "python-dotenv (>=0.21.0,<0.22.0)",
    "python-jose[cryptography] (>=3.4.0,<4.0.0)",
    "python-multipart (>=0.0.20,<0.1.0)",
    "redis (>=5.2.1,<6.0.0)",
    "simplejson (>=3.20.1,<4.0.0)",
    "structlog (>=25.4.0,<26.0.0)",
    "sqlalchemy[asyncio] (>=2.0.7,<3.0.0)",
    "sqlalchemy-utils (>=0.41.2,<0.42.0)",
    "tenacity (>=8.0.1,<9.0.0)",
    "typer (>=0.15.3,<1.0.0)",
    "uvicorn[standard] (>=0.35.0,<0.36.0)",
