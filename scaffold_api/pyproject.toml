[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.urls]
Repository = "https://github.com/your-org/scaffold"
Issues = "https://github.com/your-org/scaffold/issues"

[tool.hatch.build.targets.wheel]
packages = ["scaffold_api"]

[tool.hatch.build.targets.wheel.shared-data]
"py.typed" = "py.typed"

[tool.hatch.metadata]
allow-direct-references = true

[tool.mypy]
python_version = "3.13"
mypy_path = "./mypy"
# strict = true
# follow_imports = "skip"
# warn_return_any = true
# disallow_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_unused_configs = true
strict_equality = true
extra_checks = true
check_untyped_defs = true
plugins = ["sqlalchemy.ext.mypy.plugin", "pydantic.mypy"]
exclude = "(migrations/target|tests/target)/"

[[tool.mypy.overrides]]
module = ["emails.*", "factory.*", "dill.*", "google.cloud.*", "pymupdf.*", "web3.*", "eth_account.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["nanoid.*"]
ignore_errors = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = 'auto'
addopts = "--cov . --cov-report=term-missing:skip-covered --cov-report=xml --no-cov-on-fail --color=yes" # --replay-record-dir=build/tests/replay"
timeout = 10
env = ["IS_TEST=true"]
asyncio_default_fixture_loop_scope = "function"

[tool.ruff]
src = ["scaffold_api/*"]
exclude = [
    ".git",
    ".mypy_cache",
    ".pytest_cache",
    ".ruff_cache",
    ".venv",
    "__pycache__",
    "stubs",
]
target-version = "py313"
line-length = 88
indent-width = 4

[tool.ruff.lint]
exclude = [".git", "__pycache__"]
ignore = [
    "E501", # conflicts with black line length
    "E203", # conflicts with black space before :
    "E402", # allow imports anywhere in file
    "ERA001", # allow commented out code
    "RET504", # allow assignment before return statements
    "C408", # allow dict call instead of dict literal for readability
]
extend-select = [
    "B",      # bugbear
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I001",   # isort
    "UP",     # pyupgrade
    "RUF100", # unused-noqa
    "T2",     # flake8-typing-imports
    "T201",   # flake8-print
    "T203",   # flake8-pprint
    "PIE",    # flake8-pie
    "ERA",    # flake8-eradicate
    "SIM",    # flake8-simplify
    "TID",    # flake8-tidy-imports
    "RET",    # flake8-return
    "RSE",    # flake8-raise
    "ISC",    # flake8-implicit-str-concat
    "C4",     # flake8-comprehensions
    "PLE",    # pylint-errors
    "PLW",    # pylint-warnings
]

[tool.ruff.lint.isort]
known-first-party = ["app", "lib", "tests"]

# [tool.ruff.lint.flake8.tidy-imports]
# [tool.ruff.lint.flake8.tidy-imports.banned-api]
# deprecate a function
# "some_module.submodule.some_function".msg = "Use some_other_func instead"

[tool.ruff.lint.per-file-ignores]
"__init__.py" = [
    "F401", # intentionally unused imports
    "F403", # allow wildcard imports
]

[tool.ruff.lint.extend-per-file-ignores]
"__init__.py" = [
    "F401", # intentionally unused imports
    "F403", # allow wildcard imports
]
"*.ipynb" = [
    "B018", # unused variables
    "T201", # allow print statements
    "T203", # allow pprint statements
    "I001", # allow imports anywhere in file
]
"**/app/db/setup/**/*" = [
    "T201", # allow print statements
    "T203", # allow pprint statements
]
"**/scripts/**/*" = [
    "T201", # allow print statements
    "T203", # allow pprint statements
]

[tool.ruff.lint.flake8-bugbear]
extend-immutable-calls = [
    "fastapi.Body",
    "fastapi.Depends",
    "fastapi.params.Depends",
    "fastapi.Query",
    "fastapi.params.Query",
]

[tool.vulture]
paths = ["."]
exclude = ["migrations", "tests"]
sort_by_size = true
verbose = true
# turning on alters output to format for `whitelist.py`
# so you can extend the ignores for easier running in future
make_whitelist = true
