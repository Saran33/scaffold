[project.optional-dependencies]

[project.scripts]

[tool.uv]
environments = [
    "sys_platform == 'darwin'",
    "sys_platform == 'linux'",
]
required-environments = [
    "sys_platform == 'linux' and platform_machine == 'x86_64'",
    # "sys_platform == 'darwin' and platform_machine == 'aarch64'",
]
resolution = "highest"

dev-dependencies = [
    "aiohttp (>=3.11.16,<4.0.0)",
    "asgi-lifespan (>=2.1.0,<3.0.0)",
    "factory-boy (>=3.3.3,<4.0.0)",
    "gevent (>=25.9.1,<26.0.0)",
    "google-api-python-client-stubs (>=1.29.0,<2.0.0)",
    "google-auth-stubs (>=0.3.0,<0.4.0)",
    "ipykernel (>=6.29.5,<7.0.0)",
    "mypy (>=1.17.1,<2.0.0)",
    "pre-commit (==4.1.0)",
    "pymupdf (>=1.26.5,<2.0.0)",
    "pytest (>=8.3.4,<9.0.0)",
    "pytest-asyncio (>=0.25.3,<0.26.0)",
    "pytest-cov (>=6.0.0,<7.0.0)",
    "pytest-env (>=1.1.5,<2.0.0)",
    "pytest-randomly (>=3.16.0,<4.0.0)",
    "pytest-recording (==0.13.2)",
    "pytest-timeout (>=2.3.1,<3.0.0)",
    "pytest-xdist (>=3.6.1,<4.0.0)",
    "requests (>=2.28.1,<3.0.0)",
    "ruff (>=0.11.2,<0.12.0)",
    "types-aiofiles (>=24.1.0.20241221,<25.0.0)",
    "types-passlib (>=1.7.7.10,<2.0.0)",
    "types-python-dateutil (>=2.8.19.13,<3.0.0)",
    "types-python-jose (>=3.3.4.5,<4.0.0)",
    "types-pyyaml (>=6.0.12.20241230,<7.0.0)",
    "types-redis (>=4.6.0.20241004,<5.0.0)",
    "types-requests (>=2.28.11.15,<3.0.0)",
    "types-simplejson (>=3.20.0.20250218,<4.0.0)",
    "types-sqlalchemy-utils (>=1.0.1,<2.0.0)",
    "types-toml (>=0.10.8.5,<0.11.0)",
    "vcrpy (>=6.0.2,<7.0.0)",
    "watchfiles (>=1.0.4,<2.0.0)",
