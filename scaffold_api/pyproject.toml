[project]
name = "scaffold_api"
version = "0.1.0"
description = ""
requires-python = ">=3.13.1,<4.0"
authors = [{ name = "Tanantor Ltd." }]
maintainers = [{ name = "Saran Connoly", email = "saran@tanantor.com" }]
readme = "README.md"
license = { text = "MIT" }

